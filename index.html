Vatan ona tuproqdan boshlanadi. Uning har bir qarich yeri muqaddasdir. Inson uchun suv, havo, ota-ona qanchalik aziz bo‘lsa, Vatan ham shunchalik mo‘tabar.

Dunyoda mamlakatlar, shaharlar ko‘p. Lekin inson uchun uning Vatani ona kabi yagonadir.`,questions:["Dunyoda chiroyli shaharlar va davlatlar juda ko‘p ekan. Nima uchun inson ularning hammasini emas, ayniqsa o‘zi tug‘ilib o‘sgan joyini “Vatan” deb ataydi?","Matnda Vatan onaga o‘xshatilgan. Sizningcha, Vatan bilan onaning qanday o‘xshashliklari bor?","“Vatanning har bir qarich yeri muqaddas” deyilgan. Biz bu muqaddaslikni kundalik hayotimizda qanday asrashimiz mumkin?","Nima uchun inson boshqa davlatga mehmonga borsa ham, baribir o‘z uyini va mahallasini sog‘inaveradi?","Agar inson o‘z uyini, mahallasini yaxshi ko‘rmasa, uni “Vatanni sevadi” deb ayta olamizmi? Nima uchun?"]},{id:"1-q1-s2",title:"Kumush qish",text:"",questions:[]},{id:"1-q1-s3",title:"Rahimdil qizcha",text:"",questions:[]},{id:"1-q1-s4",title:"Izza — bir qoshiq jizza",text:"",questions:[]},{id:"1-q1-s5",title:"Sovg‘a",text:"",questions:[]},{id:"1-q1-s6",title:"Kutubxona — nurxona",text:"",questions:[]},{id:"1-q1-s7",title:"Bahor ta’rifi",text:"",questions:[]}]},{id:"1-q2",name:"II-chorak",stories:[]},{id:"1-q3",name:"III-chorak",stories:[]},{id:"1-q4",name:"IV-chorak",stories:[]}]},{id:2,name:"2-sinf",quarters:[{id:"2-q1",name:"I-chorak",stories:[{id:"2-q1-s1",title:"Vatan",text:"",questions:[]},{id:"2-q1-s2",title:"Ozod va obod Vatan",text:"",questions:[]},{id:"2-q1-s3",title:"Toshkentdagi yangi bog‘",text:"",questions:[]},{id:"2-q1-s4",title:"Yer yuzining bezagi",text:"",questions:[]},{id:"2-q1-s5",title:"Kitobim — oftobim",text:"",questions:[]},{id:"2-q1-s6",title:"Ilmsizlik zulmati",text:`Qadim zamonda o‘qish va yozishni yomon ko‘radigan bir bola bo‘lgan ekan. U turli bahonalar bilan maktabga bormas, borganda ham berilgan vazifalarni bajarmay, faqat yomon baho olar ekan. Ota-onasining tanbehlariga quloq solmay: “Men katta bo‘lsam, cho‘pon bo‘laman, qo‘y boqish uchun o‘qish kerak emas”, — der ekan.

U bir kuni uylari yaqinidagi qir-adirdan qo‘ziqorin terib kelish uchun tepalikka chiqibdi. Qo‘ziqorinlarni terib yurib, uylaridan ancha uzoqlashib ketibdi. Yurib-yurib uncha chuqur bo‘lmagan bir daryo sohiliga yetibdi. Narigi sohildan ham qo‘ziqorin termoqchi bo‘lib ko‘prik qidiribdi. Yaqin atrofdagi ko‘prik oldiga borib qarasa, uning chetidagi taxtachaga nimadir yozib qo‘yilgan ekan. Bola yozuvni o‘qiy olmabdi va to‘g‘ri narigi sohilga qarab yuribdi. Ko‘prikning o‘rtasiga kelganda u sinib, bola suvga tushib ketibdi. U ovozining boricha yordamga chaqiribdi. Shu orada qo‘ylarini o‘tlatib yurgan bir cho‘pon kaltagini uzatib, bolani suvdan chiqarib olibdi va: “Nega bu ko‘prikdan o‘tding?! Ko‘prik ustidagi ‘Bu ko‘prikdan yurmang, nariroqda yangi ko‘prik bor’, degan yozuvni ko‘rmadingmi?” — deb so‘rabdi. Bola unga javoban: “Ko‘rdim, lekin o‘qiy olmadim, chunki men o‘qishni bilmayman”, — debdi. Shunda cho‘pon unga: “E bolam, hatto qo‘y boqish uchun ham o‘qish kerak”, — debdi.`,questions:["Bolakay nima uchun daryoga tushib ketdi? Bunga ko‘prikning yomonligi aybdormi yoki bolaning o‘qishni bilmasligimi?","Agar bola o‘qishni juda yaxshi bilganida, u daryo bo‘yiga kelganida nima qilgan bo‘lar edi? Uning kuni qanday davom etardi?","Bolakay: “Cho‘pon bo‘lish uchun o‘qish shart emas”, deb o‘ylagan edi. Sizningcha, cho‘ponga o‘qish-yozish yana nima uchun kerak bo‘lishi mumkin?","Siz ko‘chada yoki maktabda biror yozuvni o‘qiy olmasangiz, qanday xavfli yoki noqulay vaziyatga tushib qolishingiz mumkin? Biror misol ayta olasizmi?","Agar siz o‘sha suvdan chiqib kelgan bolaning do‘sti bo‘lsangiz, unga keyingi safar maktabga borishi uchun qanday maslahat bergan bo‘lardingiz?"]},{id:"2-q1-s7",title:"Buyuk ixtirochilar",text:"",questions:[]},{id:"2-q1-s8",title:"Tovush",text:"",questions:[]}]},{id:"2-q2",name:"II-chorak",stories:[]},{id:"2-q3",name:"III-chorak",stories:[]},{id:"2-q4",name:"IV-chorak",stories:[]}]},{id:3,name:"3-sinf",quarters:[{id:"3-q1",name:"I-chorak",stories:[{id:"3-q1-s1",title:"Vatan madhi dillarda",text:"",questions:[]},{id:"3-q1-s2",title:"Opa-singillar",text:`Madina va Maftuna ismli qizaloqlar bor bo‘lib, ular juda qiziquvchan opa-singil edilar. Har kuni qizlar ota-onalariga juda ko‘p savollar berishar, ular esa qizlarining savollariga javob berishga ulgurishmas edi.

Shunday bo‘lsa-da, savollarning keti uzilmasdi:

— Nima sababdan?
— Nimaga?

Shunday qilib, bir kuni qizlar hovliga, undan ko‘chaga chiqib o‘ynashdi. Madina cho‘ntagidan konfet olib, qog‘ozini ochdi-da, tezda og‘ziga soldi va konfetning qog‘ozini yerga tashladi. Konfetining bittasini Maftunaga berdi. Qizlar xush kayfiyatda o‘yinni davom ettirmoqchi bo‘lishdi, biroq ularni kuzatib turgan qariya attang qilgancha boshini chayqadi va ulardan so‘radi:

— Sizlar kimning qizisiz? Ko‘chani iflos qilyapsiz-ku, bu ishingiz to‘g‘rimi?

— Men malika bo‘laman! — dedi Madina.

— Men ham malika bo‘laman! — kulib tasdiqladi Maftuna.

— Har bir qiz malika bo‘lishni orzu qiladi, — deb javob berdi qariya. — Ammo malika o‘z yurtini, xalqining mehnatini qadrlaydi. O‘sib-ulg‘aygan joyini xor qilmaydi. Har bir insonni, uning kasbini hurmat qilish lozim.

— Kasb? — ajablanib so‘radi Madina. — U nima? U mazalimi? Kattami? Nima uchun u shunday nomlangan?

— Siz kasb nima ekanligini bilmaysizmi? — qariya ajablanib so‘radi. — Ammo siz allaqachon buni bilishingiz kerak. Bu dunyoda hamma o‘z ishini astoydil bajarishi orqali bir-birlariga foyda keltiradi. Shifokor kasallarni davolaydi, o‘qituvchi o‘quvchilarga ta’lim beradi, haydovchi haydovchilik qiladi. Sartarosh odamlarni chiroyli soch turmagi bilan xursand qiladi. Obodonlashtirish xodimlari esa yo‘llarni, ko‘chalarni supurib tozalashadi. Bularning barchasi kasblar sanaladi, — dedi va o‘z yo‘lida davom etdi.

Qizlar esa qariyaning gapini tushunmay, o‘ylanib qolishdi.`,questions:["“Malika” bo‘lish nima degani? Madina va Maftuna o‘zlarini “malika” deb hisoblashadi. Sizningcha, haqiqiy malika faqat chiroyli kiyinib yurishi kerakmi yoki qariya aytganidek, atrof-muhitni toza tutishi ham muhimmi? Nima uchun?","Madina konfet qog‘ozini yerga tashlaganida, kimning mehnatini hurmat qilmagan bo‘ladi? Agar ko‘chadagi hamma odam bittadan konfet qog‘ozini yerga tashlasa, ko‘cha qanday ko‘rinishga kelib qoladi?","Qariya nima uchun qizlardan “Sizlar kimning qizisiz?” deb so‘radi? Yomon ish qilgan bolaning odobi haqida odamlar nima deb o‘ylashadi?","Kasb va mas’uliyat. Qizlar kasb nimaligini bilishmas edi. Tasavvur qiling, agar obodonlashtirish xodimlari bir kun ishga chiqmasalar, shahrimizda nima sodir bo‘ladi? Boshqa kasblarni ham (masalan, novvoy yoki shifokor) shunday tasavvur qilib ko‘ring.","Matn oxirida qizlar “o‘ylanib qolishdi” deyilgan. Sizningcha, ular nima haqida o‘ylashayotgan edi? Keyingi safar Madina konfet yesa, qog‘ozini nima qiladi deb o‘ylaysiz?"]},{id:"3-q1-s3",title:"Chorining qobiliyati",text:"",questions:[]},{id:"3-q1-s4",title:"Odob",text:"",questions:[]},{id:"3-q1-s5",title:"Yaxshilik",text:"",questions:[]},{id:"3-q1-s6",title:"Filipok",text:"",questions:[]},{id:"3-q1-s7",title:"Dum-dumaloq qo‘ng‘iz",text:"",questions:[]}]},{id:"3-q2",name:"II-chorak",stories:[]},{id:"3-q3",name:"III-chorak",stories:[]},{id:"3-q4",name:"IV-chorak",stories:[]}]},{id:4,name:"4-sinf",quarters:[{id:"4-q1",name:"I-chorak",stories:[{id:"4-q1-s1",title:"Yagonadir Vataning sening",text:"",questions:[]},{id:"4-q1-s2",title:"Sayroqi qushcha",text:`Bugun Xosiyatxonning dadasi qafasda sayroqi qush olib keldi. Xosiyatxon singlisi Hidoyatbonu bilan qushchani ko‘rib, quvonib ketishdi. So‘ng qafas yoniga kelib, uni tomosha qila boshladi. Qushcha chiroyli edi. Uning mayin patlari sariq, jajji qanotlarining uchlari esa oppoq edi. Qushchaning harakatlarini kuzatib turgan Hidoyatbonu:

— Opa, qushcha nega qo‘rqyapti? — deb so‘radi.

— Sen ham bir o‘zing begona odamlar uyiga kirsang qo‘rqasan-ku! Shunga qushcha ham qo‘rqyapti.

— Voy, unda biz begonamizmi? — hayratlanib so‘radi Hidoyatbonu.

— Ha, u bizni hech qachon ko‘rmagan, shu sababli bizni tanimaydi, — dedi so‘zlarini dona-dona qilib Xosiyatxon.

Opa-singil qushchani yana biroz tomosha qilishdi. Qushcha sakrashda davom etardi.

— Opajon, keling, unga eng chiroyli o‘yinchog‘imizni beramiz.

— Qushcha o‘yinchoq o‘ynamaydi.

— Nima bo‘pti, u bilan o‘ynaymiz. Keyin qushchaga begona bo‘lmaymiz, — dedi sevinib Hidoyatbonu.

— Yo‘q… Kel, yaxshisi qafasga daraxt shoxlaridan o‘rnatamiz. Qushcha daraxtzorda uchib yurgandek maza qilib yashaydi, — javob berdi Xosiyatxon singlisiga qarab.

— Voy, qanday yaxshi! — Hidoyatbonu chapak chalib yubordi.

Opa-singil birpasda shox-shabba yig‘ib kelishdi. Nilufar opa qizlariga yordam berdi. Ular ayri shoxlardan uchtasini qafas ichiga tikka qilib qo‘yishdi. Endi qafasning ichi shinamgina daraxtzorga aylandi. Xosiyatxon qushchaning idishiga suv quydi. Hidoyatbonu esa ikkinchi idishchani tariq bilan to‘ldirdi. Ammo qushcha hali ham shoxdan shoxga pitirlab sakrardi.

— Oyijon, bu qushcha chumchuqmi? — so‘radi Xosiyatxon.

— Yo‘q, bolajonim, bu — kanareyka. U juda yoqimli sayraydi.

— Unga daraxtzor yoqdimi ekan?

— Menimcha, sizlar mehr bilan yasagan kichkina daraxtzor qushchaga juda yoqqan bo‘lsa kerak, — dedi onasi.

— U hali ham qo‘rqyapti-ku… — dedi Hidoyatbonu.

— Qushcha yangi joyga o‘rgansa, sizlarga bir sayrab beradiki, qoyil qolasiz.

Ertasiga kutilmaganda qushcha jarangdor ovozda sayrab yubordi.

— O‘o‘, qushcha juda sayroqi ekan-ku! Ovozi uyni to‘ldirib yubordi-ya, — hayratlandi dadasi.

— Qushlarning sayrashida hikmat bor. Ular tinchlik-omonlik, mehr-oqibat, qut-baraka bor joyda shukrona aytib sayraydi, — dedi buvisi jilmayib.`,questions:["Nega qushcha boshida qo‘rqdi deb o‘ylaysiz? Siz uning o‘rnida bo‘lsangiz, qanday his qilardingiz?","Xosiyatxon va Hidoyatbonu qushchaga yordam berish uchun qanday ishlar qilishdi? Siz bo‘lsangiz yana nima qo‘shgan bo‘lardingiz?","Nima uchun qushcha darrov sayramadi, faqat ertasi kuni sayray boshladi?","Matnda “mehr” degan tushuncha qanday ko‘rsatilgan? Qaysi joylarda buni sezish mumkin?","Buvisi “qushlar tinchlik va mehr bor joyda sayraydi” dedi. Siz bu fikrga qo‘shilasizmi? Nega?"]},{id:"4-q1-s3",title:"Marvarid",text:"",questions:[]},{id:"4-q1-s4",title:"Toshbag‘ir",text:"",questions:[]},{id:"4-q1-s5",title:"Qarg‘a va paxta",text:"",questions:[]},{id:"4-q1-s6",title:"Qanot qoqqan orzular",text:"",questions:[]},{id:"4-q1-s7",title:"Yetti xazinaning biri",text:"",questions:[]},{id:"4-q1-s8",title:"Hunarli mingni yengar",text:"",questions:[]},{id:"4-q1-s9",title:"Kitob va boylik",text:"",questions:[]}]},{id:"4-q2",name:"II-chorak",stories:[]},{id:"4-q3",name:"III-chorak",stories:[]},{id:"4-q4",name:"IV-chorak",stories:[]}]}]},io="matnlar-olami-data-v1";function Ah(){try{const e=localStorage.getItem(io);if(e)return JSON.parse(e)}catch(e){console.error("Saqlangan ma'lumotni o'qishda xato:",e)}return JSON.parse(JSON.stringify(ed))}function fr(e){try{return localStorage.setItem(io,JSON.stringify(e)),!0}catch(t){return console.error("Ma'lumotni saqlashda xato:",t),!1}}function $h(){return localStorage.removeItem(io),JSON.parse(JSON.stringify(ed))}function Vh(e="item"){return`${e}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`}function Hh(e,t,n,r){const l=JSON.parse(JSON.stringify(e)),i=l.classes.find(o=>o.id===t);if(!i)return l;const a=i.quarters.find(o=>o.id===n);return a&&(a.stories.push({id:Vh("story"),title:r.title||"Nomsiz matn",text:r.text||"",questions:r.questions||[]}),fr(l)),l}function Wh(e,t,n,r,l){c d)}.story-item__actions{display:flex;gap:.4rem;opacity:0;transition:opacity .15s}.story-item:hover .story-item__actions{opacity:1}.story-reader{background:var(--paper-light);border:1px solid var(--border);border-radius:10px;padding:clamp(1.5rem,4vw,3rem);margin:2rem 0;box-shadow:var(--shadow-sm);position:relative}.story-reader__header{text-align:center;margin-bottom:2rem;padding-bottom:2rem;border-bottom:1px dashed var(--border)}.story-reader__eyebrow{font-family:var(--font-ui);font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.5rem}.story-reader__title{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;color:var(--forest-deep);margin:0}.story-reader__ornament{width:48px;height:1px;background:var(--gold);margin:1.25rem auto 0;position:relative}.story-reader__ornament:after{content:"✦";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--paper-light);padding:0 8px;color:var(--gold);font-size:.85rem}.story-reader__text{font-family:var(--font-body);font-size:1.13rem;line-height:1.85;color:var(--ink-soft);white-space:pre-wrap}.story-reader__text p:first-child:first-letter{font-family:var(--font-display);font-size:3.5rem;font-weight:700;color:var(--forest);float:left;line-height:.9;padding-right:.5rem;padding-top:.3rem}.questions-section{margin-top:2.5rem;padding-top:2rem;border-top:2px solid var(--border)}.questions-section__title{font-family:var(--font-display);font-size:1.6rem;color:var(--forest-deep);display:flex;align-items:center;gap:.6rem;margin-bottom:1.5rem}.questions-section__title:before{content:"?";width:36px;height:36px;display:grid;place-items:center;background:var(--gold);color:var(--paper-light);border-radius:50%;font-size:1.1rem;font-weight:800}.question-list{list-style:none;padding:0;margin:0;counter-reset:q-counter}.question-item{counter-increment:q-counter;position:relative;background:var(--paper);border-left:3px solid var(--fores ight:60px}.breadcrumb{font-family:var(--font-ui);font-size:.85rem;color:var(--ink-muted);margin:1.5rem 0 .5rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}.breadcrumb a{color:var(--forest)}.breadcrumb a:hover{text-decoration:underline}.breadcrumb__sep{color:var(--border)}.site-footer{margin-top:5rem;padding:2.5rem 0;background:var(--paper-dark);border-top:1px solid var(--border);text-align:center;font-family:var(--font-body);font-style:italic;color:var(--ink-muted);font-size:.9rem}.site-footer p{margin:.25rem 0}.toast{position:fixed;bottom:2rem;left:50%;transform:translate(-50%);background:var(--forest-deep);color:var(--paper-light);padding:.85rem 1.5rem;border-radius:8px;font-family:var(--font-ui);font-size:.92rem;font-weight:500;box-shadow:var(--shadow-lg);z-index:200;animation:slideUp .25s ease-out}.toast--error{background:var(--maroon)}@keyframes fadeIn{0%{opacity:0}to{opacity:1}}@keyframes scaleIn{0%{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}@keyframes slideUp{0%{transform:translate(-50%,1rem);opacity:0}to{transform:translate(-50%);opacity:1}}@keyframes fadeInUp{0%{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeInUp .4s ease-out both}@media print{.site-header,.site-footer,.breadcrumb,.story-item__actions,.btn,.questions-section__title:before{display:none!important}body{background:#fff}.story-reader{border:none;box-shadow:none;padding:0}}@media (max-width: 720px){body{font-size:16px}.site-header__inner{flex-direction:column;align-items:stretch}.site-nav,.site-logo{justify-content:center}.story-item__actions{opacity:1}.quarter-tab{padding:.55rem .9rem;font-size:.88rem}}</style>
  </head>
  <body>
    <div id="root"></div>
    <style>
      .creator-card {
        background: var(--paper);
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
      }

      .creator-card__photo {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--border);
        background: var(--paper-dark);
        margin-bottom: 0.75rem;
      }

      .creator-card__empty {
        color: var(--ink-muted);
        font-style: italic;
        margin: 0;
      }

      .homepage-creators {
        margin: 3rem auto 0;
        padding: 2rem 1.5rem;
        max-width: 980px;
      }

      .homepage-creators__inner {
        background: var(--paper-light);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1.5rem;
        text-align: center;
      }

      .homepage-creators__title {
        color: var(--forest-deep);
        margin-bottom: 0.5rem;
      }

      .homepage-creators__grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
        margin-top: 1.25rem;
        text-align: left;
      }

      .homepage-creators .creator-card {
        margin-bottom: 0;
      }
    </style>
    <script>
      (function () {
        const STORAGE_KEY = "matnlar-olami-creators-v1";

        function loadCreators() {
          try {
            const raw = window.localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
          } catch (error) {
            return [];
          }
        }

        function saveCreators(creators) {
          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(creators));
        }

        function closeCreatorModal() {
          const modal = document.querySelector("[data-creator-modal]");
          if (modal) modal.remove();
        }

        function renderCreatorPreview(container, creators, options = {}) {
          const editable = options.editable !== false;
          container.innerHTML = "";

          if (!creators.length) {
            const empty = document.createElement("p");
            empty.className = "creator-card__empty";
            empty.textContent = "Hali yaratuvchi ma'lumotlari kiritilmagan.";
            container.appendChild(empty);
            return;
          }

          creators.forEach((creator, index) => {
            const card = document.createElement("div");
            card.className = "creator-card";

            if (creator.photo) {
              const image = document.createElement("img");
              image.className = "creator-card__photo";
              image.alt = creator.name || "Yaratuvchi rasmi";
              image.src = creator.photo;
              card.appendChild(image);
            }

            const title = document.createElement("h4");
            title.textContent = creator.name || "Nomsiz yaratuvchi";
            card.appendChild(title);

            if (creator.role) {
              const role = document.createElement("p");
              role.style.margin = "0 0 0.35rem";
              role.style.color = "var(--forest-deep)";
              role.style.fontFamily = "var(--font-ui)";
              role.style.fontWeight = "600";
              role.textContent = creator.role;
              card.appendChild(role);
            }

            if (creator.about) {
              const about = document.createElement("p");
              about.style.margin = "0 0 0.5rem";
              about.textContent = creator.about;
              card.appendChild(about);
            }

            if (creator.contact) {
              const contact = document.createElement("p");
              contact.style.margin = "0";
              contact.style.fontSize = "0.9rem";
              contact.style.color = "var(--ink-muted)";
              contact.textContent = creator.contact;
              card.appendChild(contact);
            }

            if (editable) {
              const remove = document.createElement("button");
              remove.type = "button";
              remove.className = "btn btn--danger btn--sm";
              remove.style.marginTop = "0.75rem";
              remove.textContent = "O'chirish";
              remove.addEventListener("click", () => {
                const updated = loadCreators().filter((_, itemIndex) => itemIndex !== index);
                saveCreators(updated);
                renderCreatorPreview(container, updated);
                renderHomepageCreators();
              });
              card.appendChild(remove);
            }
            container.appendChild(card);
          });
        }

        function renderHomepageCreators() {
          const creators = loadCreators();
          const existing = document.querySelector("[data-homepage-creators]");
          const renderKey = JSON.stringify(creators);

          if (!creators.length) {
            if (existing) existing.remove();
            return;
          }

          const footer = document.querySelector(".site-footer");
          if (!footer) return;
          if (existing && existing.dataset.renderKey === renderKey) return;

          const section = existing || document.createElement("section");
          section.className = "homepage-creators";
          section.dataset.homepageCreators = "true";
          section.dataset.renderKey = renderKey;
          section.innerHTML = `
            <div class="homepage-creators__inner">
              <h2 class="homepage-creators__title">Yaratuvchilar</h2>
              <p style="color: var(--ink-muted); font-style: italic; margin: 0;">Sayt yaratuvchilari haqida ma'lumot</p>
              <div class="homepage-creators__grid" data-homepage-creator-list></div>
            </div>
          `;

          if (!existing) {
            footer.parentNode.insertBefore(section, footer);
          }

          renderCreatorPreview(
            section.querySelector("[data-homepage-creator-list]"),
            creators,
            { editable: false }
          );
        }

        function readPhoto(file) {
          return new Promise((resolve, reject) => {
            if (!file) {
              resolve("");
              return;
            }

            const reader = new FileReader();
            reader.onload = () => resolve(String(reader.result || ""));
            reader.onerror = () => reject(new Error("Rasmni yuklab bo'lmadi"));
            reader.readAsDataURL(file);
          });
        }

        function openCreatorModal() {
          closeCreatorModal();

          const backdrop = document.createElement("div");
          backdrop.className = "modal-backdrop";
          backdrop.dataset.creatorModal = "true";

          const modal = document.createElement("div");
          modal.className = "modal";
          modal.addEventListener("click", (event) => event.stopPropagation());

          modal.innerHTML = `
            <div class="modal__header">
              <h3 class="modal__title">Yaratuvchilar ma'lumoti</h3>
              <button class="modal__close" type="button" aria-label="Yopish">×</button>
            </div>
            <div class="modal__body">
              <div data-creator-preview></div>
              <div class="form-field">
                <label class="form-label" for="creator-name">Ism familiya *</label>
                <input id="creator-name" class="input" type="text" placeholder="Masalan: Mansur ..." />
              </div>
              <div class="form-field">
                <label class="form-label" for="creator-role">Lavozim yoki vazifa</label>
                <input id="creator-role" class="input" type="text" placeholder="Masalan: Boshlang'ich sinf o'qituvchisi" />
              </div>
              <div class="form-field">
                <label class="form-label" for="creator-about">Qisqa ma'lumot</label>
                <textarea id="creator-about" class="textarea" rows="4" placeholder="Yaratuvchi haqida qisqa ma'lumot yozing..."></textarea>
              </div>
              <div class="form-field">
                <label class="form-label" for="creator-contact">Bog'lanish ma'lumoti</label>
                <input id="creator-contact" class="input" type="text" placeholder="Telefon, email yoki ijtimoiy tarmoq" />
              </div>
              <div class="form-field">
                <label class="form-label" for="creator-photo">Rasm yuklash</label>
                <input id="creator-photo" class="input" type="file" accept="image/*" />
              </div>
            </div>
            <div class="modal__footer">
              <button class="btn btn--ghost" type="button" data-creator-cancel>Bekor qilish</button>
              <button class="btn btn--primary" type="button" data-creator-save>Saqlash</button>
            </div>
          `;

          backdrop.appendChild(modal);
          document.body.appendChild(backdrop);

          const preview = modal.querySelector("[data-creator-preview]");
          const nameInput = modal.querySelector("#creator-name");
          const roleInput = modal.querySelector("#creator-role");
          const aboutInput = modal.querySelector("#creator-about");
          const contactInput = modal.querySelector("#creator-contact");
          const photoInput = modal.querySelector("#creator-photo");

          renderCreatorPreview(preview, loadCreators());
          nameInput.focus();

          backdrop.addEventListener("click", closeCreatorModal);
          modal.querySelector(".modal__close").addEventListener("click", closeCreatorModal);
          modal.querySelector("[data-creator-cancel]").addEventListener("click", closeCreatorModal);
          modal.querySelector("[data-creator-save]").addEventListener("click", async () => {
            const name = nameInput.value.trim();
            if (!name) {
              window.alert("Yaratuvchi ismini kiriting");
              nameInput.focus();
              return;
            }

            const photo = await readPhoto(photoInput.files && photoInput.files[0]);
            const creators = loadCreators();
            creators.push({
              name,
              role: roleInput.value.trim(),
              about: aboutInput.value.trim(),
              contact: contactInput.value.trim(),
              photo,
              createdAt: new Date().toISOString()
            });
            saveCreators(creators);

            nameInput.value = "";
            roleInput.value = "";
            aboutInput.value = "";
            contactInput.value = "";
            photoInput.value = "";
            renderCreatorPreview(preview, creators);
            renderHomepageCreators();
          });
        }

        const observer = new MutationObserver(() => renderHomepageCreators());
        observer.observe(document.body, { childList: true, subtree: true });
        window.addEventListener("load", renderHomepageCreators);
        setTimeout(renderHomepageCreators, 300);

        document.addEventListener("click", (event) => {
          const button = event.target.closest("button");
          if (!button || button.textContent.trim() !== "Yaratuvchilar") return;

          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          openCreatorModal();
        }, true);
      })();
    </script>
    
  </body>
